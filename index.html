<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo CRUD Application</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h2 class="main-heading">Task Manager</h2>
            <button id="openModalBtn" class="btn btn-warning">Add New Todo</button>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="thead-dark">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>User ID</th>
                            <th>Status</th>
                            <th>Edit</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody id="todoContainer">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop-custom" style="display: none;"></div>

    <div id="todoModal" class="todo-modal-custom" style="display: none;">
        <div class="modal-custom-header bg-success text-white p-3 d-flex justify-content-between align-items-center">
            <h5 id="modalTitle" class="m-0">Add New Todo</h5>
            <button id="closeModalIcon" class="close text-white" style="font-size: 30px; line-height: 1;">&times;</button>
        </div>
        <div class="modal-custom-body p-4">
            <form id="todoForm">
                <div class="form-group">
                    <label class="font-weight-bold">Todo Title *</label>
                    <input type="text" id="title" class="form-control" placeholder="Enter title..." required>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">User ID *</label>
                    <select id="userId" class="form-control" required>
                        <option value="" disabled selected>Select User ID (1-10)</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">Status *</label>
                    <select id="completed" class="form-control">
                        <option value="false">Pending</option>
                        <option value="true">Completed</option>
                    </select>
                </div>
                <div class="text-right mt-4">
                    <button type="button" id="closeModalBtn" class="btn btn-secondary mr-2">Close</button>
                    <button type="submit" id="addTodoBtn" class="btn btn-success">Save</button>
                    <button type="button" id="updateTodoBtn" class="btn btn-warning d-none">Update</button>
                </div>
            </form>
        </div>
    </div>

    <div id="spinner" class="spinner-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
