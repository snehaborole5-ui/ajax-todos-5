<!DOCTYPE html>
<html>
	<head>
		<title>Todos 5</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
		<link rel ="stylesheet" href ="./assets/css/style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	</head>
	<body>
		<div class="container-fluid mt-5">
			<div class="row">
				<div class="col-md-4">
					<div class="card">
						<div class="card-header bg-primary">
							<h2>Todo Form</h2>
						</div>
						<div class="card-body">
							<form action="" id="inputform">
								<div class="form-group">
									<label for="title" class="font-weight-bold">Title*</label>
									<input type="text" required class="form-control" id="title">
								</div>
								<div class="form-group">
									<label for="UserId" class="font-weight-bold">UserId*</label>
									<select class="form-control" required id="UserId">
										<option value="1">1</option>
										<option value="2">2</option>
										<option value="3">3</option>
										<option value="4">4</option>
										<option value="5">5</option>
										<option value="6">6</option>
										<option value="7">7</option>
										<option value="8">8</option>
										<option value="9">9</option>
										<option value="10">10</option>
									</select>
								</div>
								<div class="form-group">
									<label for="status" class="font-weight-bold">Is Completed?</label>
									<select class="form-control" required id="status">
										<option value="Select">Select</option>
										<option value="true" class="bg-success">Completed</option>
										<option value="false" class="bg-danger">NOt Completed</option>
									</select>
								</div>
								<button class="btn btn-sm btn-block btn-outline-primary" id="Addtodo">Add Todo</button>
								<button type="button" class="d-none btn btn-sm btn-block btn-outline-success" id="Updatetodo">Update Todo</button>

							</form>
						</div>
					</div>
				</div>
				<div class="col-md-6 offset-md-1">
					<div class="card ">
						<div class="card-header bg-primary">
							<h2>Todo Tasks</h2>
						</div>
						<div class="card-body p-0">
							<table class="table table-responsive table-bordered m-0">
								<thead>
									<tr>
										<th>Sr No</th>
										<th>Title</th>
										<th>Status</th>
										<th>Edit</th>
										<th>Remove</th>
									</tr>
								</thead>
								<tbody id="todocontainer">
									
								</tbody>
							</table>
						</div>
					</div>
				</div>

			</div>
			
		</div>
		<div class="spinner d-none" id="spinner">
			<div class="spinner-border text-primary" role="status">
  				<span class="sr-only">Loading...</span>
			</div>
		</div>	
		
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="./assets/js/app.js"></script>
	</body>
</html>
